version: '3.8'

services:
  frontend:
    build: .
    container_name: chaosops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: chaosops-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # add DB URL if needed
      # - MONGO_URI=mongodb://mongo:27017/chaosops

  # Uncomment if using MongoDB
  # mongo:
  #   image: mongo
  #   container_name: chaosops-mongo
  #   ports:
  #     - "27017:27017"