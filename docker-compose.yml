version: '3.8'

services:
  frontend:
    build: .
    container_name: chaosops-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: chaosops-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://chaosops-mongo:27017/ChaosOpsStats

  # Uncomment if using MongoDB
  mongo:
    image: mongo:latest
    container_name: chaosops-mongo
    ports:
      - "27017:27017"